upstream mywebapp {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/mywebapp.access.log combined;
    error_log  /var/log/nginx/mywebapp.error.log warn;

    # ── Explicitly blocked endpoints (health checks are internal-only) ──────
    location /health {
        return 403 "Forbidden";
    }

    # ── Root endpoint ────────────────────────────────────────────────────────
    location = / {
        proxy_pass         http://mywebapp;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Business logic: /items and /items/<id> ───────────────────────────────
    location /items {
        proxy_pass         http://mywebapp;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404 "Not Found";
    }
}
